name: Build Apps

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pymupdf tkinterdnd2 pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "Drop-to-JPG" converter.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Drop-to-JPG-Windows
          path: dist/Drop-to-JPG.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pymupdf pyinstaller

      - name: Create launcher
        run: |
          cat > launcher.py << 'EOF'
          import tkinter as tk
          from converter import App
          root = tk.Tk()
          App(root)
          root.mainloop()
          EOF

      - name: Build APP
        run: |
          pyinstaller --onefile --name "Drop-to-JPG" \
            --add-data "converter.py:." \
            --exclude-module tkinterdnd2 \
            launcher.py

      - name: Zip APP
        run: zip -r Drop-to-JPG-Mac.zip dist/Drop-to-JPG

      - name: Upload APP
        uses: actions/upload-artifact@v4
        with:
          name: Drop-to-JPG-Mac
          path: Drop-to-JPG-Mac.zip
