name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pymupdf tkinterdnd2 pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "Drop-to-JPG" converter.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Drop-to-JPG-Windows
          path: dist/Drop-to-JPG.exe
