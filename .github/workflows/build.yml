name: Build Apps

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pymupdf tkinterdnd2 pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "Drop-to-JPG" converter.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Drop-to-JPG-Windows
          path: dist/Drop-to-JPG.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow pymupdf tkinterdnd2 py2app

      - name: Create setup.py
        run: |
          cat > setup.py << 'EOF'
          from setuptools import setup
          APP = ['converter.py']
          OPTIONS = {
              'packages': ['PIL', 'fitz', 'tkinterdnd2'],
              'iconfile': None,
              'plist': {
                  'CFBundleName': 'Drop-to-JPG',
                  'CFBundleDisplayName': 'Drop-to-JPG',
              },
          }
          setup(app=APP, options={'py2app': OPTIONS})
          EOF

      - name: Build APP
        run: python setup.py py2app

      - name: Zip APP bundle
        run: zip -r Drop-to-JPG-Mac.zip dist/Drop-to-JPG.app

      - name: Upload APP
        uses: actions/upload-artifact@v4
        with:
          name: Drop-to-JPG-Mac
          path: Drop-to-JPG-Mac.zip
